<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="__COURSE_TITLE__, a local-first Teach Loop learning workspace." />
    <title>__COURSE_TITLE__</title>
    <script>
      (() => {
        try {
          const saved = JSON.parse(localStorage.getItem("teach-loop:theme") || "null");
          const mode = saved?.mode || "system";
          const dark = mode === "dark" || (mode === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.dataset.theme = saved?.preset || "default";
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
